<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min första A-frame scen</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

</head>

<body>

    <!--Skapa en egen A-Frame-scen med minst en kub, en plan yta och en bakgrundsfärg. Försök hitta  hur man lägger till en sfär också-->

    <a-scene>
        <!-- Skapa en himmel -->
        <a-sky color="rgba(40,10,90,0.5)"></a-sky>


        <!-- Lägg till en 3D-box -->
        <a-box position="1 1 -4" src="pexels-byron-sullivan.jpg"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-box>
        <!-- Sfär -->
        <a-sphere position="-1.2 1 -3" radius="0.5" color="hotpink"
            animation="property: position; to: -1.2 2 -3; dir: alternate; dur: 2000; loop: true">
        </a-sphere>


        <!-- Lägg till en markyta -->
        <a-plane position="0 0 -4" rotation="-90 0 0" width="10" height="10" color="green"></a-plane>
    </a-scene>

    <!-- Kamera och kontroller -->
    <a-camera position="0 1.5 0">
        <a-cursor></a-cursor>
    </a-camera>

    <!-- Lägg till ljus i scenen-->
    <a-light type="directional" position="1 1 1" intensity="0.6"></a-light>
</body>

</html>
