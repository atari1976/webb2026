<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
    <nav>
        <ul>
            <li><a href="index.html">Bild</a></li>
            <li><a href="ljud.html">Ljud</a></li>
            <li><a href="video.html">Video</a></li>
            <li><a href="canvas.html">Canvas</a></li>
            <li><a href="bakgrund.html">Bakgrund</a></li>
            <li><a href="bakgrundsvideo.html">Bakgrundsvideo</a></li>
            <li><a href="three.html">Three.js</a></li>
            <li><a href="a-frame.html">A-frame</a></li>
        </ul>
    </nav>
    <main>
        <a-scene>

            <!-- Skapa en himmel -->
            <a-sky color="rgb(204, 255, 255)"></a-sky>

            <!-- 3D-box -->

            <a-box position="-1 1 -4" color="white"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-box>

            <!-- dur: 4000 - varaktighet på 4 sekunder-->

            <!-- Sfär -->
            <a-sphere position="1 1 -3" radius="0.5" color="rgb(255, 102, 102)"
                animation="property: position; to: 1 2 -3; dir: alternate; dur: 2000; loop: true">
            </a-sphere>

            <!-- Lägg till en markyta -->
            <a-plane position="0 0 -4" rotation="-90 0 0" width="10" height="10" color="green"></a-plane>

            <!--TEXT-->
            <a-text value="Olivia Stark" position="-1 2 -3" color="black"></a-text>

            <!-- Kamera och kontroller -->
            <a-camera position="0 1.5 0">
                <a-cursor></a-cursor>
            </a-camera>


        </a-scene>

        <!-- Lägg till ljus i scenen-->
        <a-light type="directional" position="1 1 1" intensity="0.6"></a-light>





    </main>
</body>

</html>
