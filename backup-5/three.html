<head>

</head>

<body>

            <li><a href="a-frame.html">A-frame</a></li>
        </ul>
    </nav>

    <main>
        <script>
            // Skapa scen, kamera och renderare
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            //Light
            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(10, 10, 10);
            scene.add(light);

            //Textur från en URL
            const texture = new THREE.TextureLoader().load('./media/pexels-byron-sullivan.webp');
            const material = new THREE.MeshStandardMaterial({ map: texture });

            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);

            // Skapa en kub
            const geometry = new THREE.BoxGeometry(2, 2, 2); // 


            const cube = new THREE.Mesh(geometry, material); // Skapar kuben
            scene.add(cube); // Lägger till kuben i scenen



            // Placera kameran
            camera.position.z = 5;

            // Animation-loop
            function animate() {
                requestAnimationFrame(animate);

                // Rotera kuben
                cube.rotation.x -= 0.01;
                cube.rotation.y -= 0.01;

                renderer.render(scene, camera);
            }
            animate();


        </script>
    </main>
</body>

</html>
