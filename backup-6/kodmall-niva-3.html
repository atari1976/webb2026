<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avancerad interaktiv webbsida - Nivå 3</title>
    <style>
        /* Grundläggande stil och layout */
        /*body {
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, sans-serif;
            margin: 20px;
        }*/

        body {
            font-family: Arial, sans-serif;
            color: rgb(0, 0, 0);
            background-color: #ffffff;
            font-size: 1rem;
            margin: 0;
            padding: 1rem;
            line-height: 1.5;
            text-align: center;
        }

        main {
            display: flex;
            flex-direction: column;
            /*standard*/
            align-items: center;
            margin: 3.125rem auto;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        h1 {
            font-size: 1.75rem;
            /* Ändrade från 28px till 1.75rem, när 1rem = 16px, 28px = 28/16 */
            text-align: center;
        }

        button {
            padding: 0.625rem 1.25rem;
            /*Ändrade padding från 10px 20px till rem */
            font-size: 1rem;
            /* Ändrade från 14px till 1rem, tillgänglighet & responsiv design */
            cursor: pointer;
            margin: 5px 0;
        }

        /* Anpassad fokusmarkering för tangentbordsnavigering */
        button:focus,
        input:focus {
            outline: 3px dashed orange;
        }

        /* Stil för rutor som skapas dynamiskt */
        .ruta {
            width: 6.25rem;
            /* Tidigare 100px*/
            height: 6.25rem;
            /* Tidigare 100px */
            background-color: lightgreen;
            margin: 0.625rem 0;
            /* Tidigare 10px 0; */
            text-align: center;
            line-height: 6.25rem;
            /* Tidigare 100px */
            font-weight: bold;
        }

        #halsning {
            font-weight: 700;
        }

        .bildhamtning {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2rem;
        }

        /*knapp*/
        .knapp-hamta-bild {
            margin: 20px auto;
        }




        /* Media query – mobilanpassning */
        @media (max-width: 600px) {

            main {
                margin: 2rem auto;
            }

            body {
                font-size: 1rem;
                /* Ändrade från 14px till 16px och därefter till 1rem. Text på ca. 14px kan vara för litet för mobiltelefoner */
            }

            button {
                margin: 1rem 0;
            }

            .ruta {
                width: 5rem;
                /* Tidigare 80px */
                height: 5rem;
                /* Tidigare 80px */
                line-height: 5rem;
                /* Tidigare 80px */
            }
        }
    </style>
</head>

<body>
    <header>
        <!-- Sidans rubrik -->
        <h1>Avancerad interaktiv webbsida</h1>
    </header>

    <main>
        <!-- Sektion 1: Skapa och rensa rutor -->
        <section aria-labelledby="rutaRubrik">
            <h2 id="rutaRubrik">Skapa rutor</h2>

            <!-- Knapp för att skapa ruta – lägg till id, aria-label / Ändrade från id till class-->
            <button class="skapa-ruta" aria-label="Skapa en ruta">Skapa ruta</button>
            <!-- Knapp för att rensa rutor – lägg till id, aria-label -->
            <button class="reset-button" aria-label="Rensa alla rutor">Återställ</button>

            <!-- Div för att visa rutor – lägg till id -->
            <div class="container"></div> <!--Ändrade från id till class-->

            <script>
                document.querySelector(".skapa-ruta").addEventListener("click", function () {
                    let nyRuta = document.createElement("div");
                    nyRuta.className = "ruta";
                    nyRuta.innerText = "Ny ruta";
                    document.querySelector(".container").appendChild(nyRuta);
                }); </script>

            <script>
                // återställ
                document.querySelector(".reset-button").addEventListener("click", function () {
                    document.querySelector(".container").innerHTML = "";
                });
            </script>
        </section>

        <!-- Sektion 2: Spara och visa namn med LocalStorage -->
        <section aria-labelledby="Ange ditt namn">
            <h2 id="namnRubrik">Spara namn</h2>

            <!-- Inputfält för namn – lägg till id och aria-label -->
            <label for="namnInput">Skriv ditt namn:</label>
            <input type="text" id="namnInput" aria-label="Skriv ditt namn" autocomplete="name">

            <!-- Knapp för att spara namn – id -->
            <button onclick="sparaNamn()" id="sparaNamn">Spara namn</button>

            <!-- Paragraf för hälsning – id, role="status", aria-live="polite" -->
            <p id="halsning" role="status" aria-live="polite"></p> <!--För tillgänglighet-->

            <script>
                function sparaNamn() {
                    let namn = document.getElementById("namnInput").value; //Hämtar användarens namn från inputsfältet
                    localStorage.setItem("användarnamn", namn);//Namnet sparas i LocalStorage
                    visaHälsning();
                }
                //När sidan laddas igen körs:
                function visaHälsning() {
                    let sparatNamn = localStorage.getItem("användarnamn");//Då hämtas namnet och texten skrivs ut.

                    if (sparatNamn) {
                        document.getElementById("halsning").innerText = "Välkommen tillbaka, " + sparatNamn + "!";
                    }
                }
                visaHälsning();
            </script>
        </section>

        <!-- Sektion 3: Hämta fakta med Fetch API -->
        <section aria-labelledby="faktaRubrik">
            <h2 id="faktaRubrik">Hämta fakta</h2>
            <!-- Knapp för att hämta fakta – id, aria-label -->
            <!-- Paragraf för att visa fakta – id, role="region", aria-live="polite" -->
        </section>

        <!-- Sektion 4: Bild med alt-text -->
        <section class="bildhamtning" aria-labelledby="Hämta en bild">
            <h2>Bild med alt-text</h2>

            <button id="knapp-hamta-bild">Hämta bild</button>

            <!-- Infoga bild från https://picsum.photos/200/100?random=1 -->

            <!-- Alt-text som förklarar att bilden är slumpad -->

            <img id="bild" src="https://picsum.photos/200/100?random=1" alt="Slumpmässig bild">

            <script>
                document.getElementById("knapp-hamta-bild").addEventListener("click", async function () {
                    let respons = await fetch("https://picsum.photos/200/100?random=1");
                    document.getElementById("bild").src = respons.url;
                });
            </script>



        </section>
    </main>

    <footer>
        <!-- Sidfot med t.ex. ditt namn eller datum -->
        <p>&copy; 2025 Avancerad sida</p>
    </footer>

    <script>
        // Skapa ruta – hämta knapp, lägg till click-event
        // I funktionen: skapa div, ge klass "ruta", lägg i rutaContainer

        // Rensa rutor – hämta knapp, lägg till click-event
        // I funktionen: ta bort alla barn till rutaContainer

        // Spara namn – hämta knapp och inputfält
        // Vid klick: spara namn i LocalStorage, visa hälsning

        // Visa hälsning – hämta sparat namn från LocalStorage vid sidladdning
        // Om namn finns: visa texten "Hej, [namn]!" i hälsning-paragrafen

        // Hämta fakta – hämta knapp
        // Vid klick: använd Fetch API, hämta fakta från API, visa i fakta-paragrafen
        // URL: https://api.chucknorris.io/jokes/random
    </script>
</body>

</html>
