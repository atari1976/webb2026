<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktiv sida</title>
    <link rel="stylesheet" href="styles.css">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; img-src 'self'; style-src 'self';">
    <meta name="description" content="En enkel övningssida">
</head>

<body class="body-bakgrund">

    <header>
        <nav></nav>
        <section class="cookie-banner" id="cookie-banner">
            <p>Vi behöver ditt samtycke för att kunna använda analys-cookies.</p>
            <div class="cookie-buttons">
                <button type="button" id="btn-ok">Ok med cookies</button>
                <button type="button" id="btn-decline-cookies">Nej till
                    cookies</button>
            </div>
        </section>
    </header>
    <main class="page">
        <h1>Användarinteraktion</h1>
        <section class="card">
            <h2>Kontakta oss</h2>
            <p>Lämna ett meddelande så kontaktar vi dig inom 48h för gemensam behovsanalys.</p>

            <form class="formular">
                <fieldset class="form-box">
                    <label for="namn">Namn</label>
                    <input type="text" id="namn" name="namn" required>

                    <label for="epost">Epost</label>
                    <input type="email" id="epost" placeholder="din-epost@exempel.se" name="email" required>

                    <label for="inputMeddelande">Lämna ett meddelande</label>
                    <textarea id="inputMeddelande" name="meddelande" placeholder="Skriv här" rows="5"></textarea>
                </fieldset>
                <p class="info-insaml">Vi kommer att använda dina uppgifter för att svara på ditt meddelande</p>

                <fieldset class="samtycke-box">
                    <legend>Samtycke</legend>
                    <div class="checkbox-och-text">
                        <label>
                            <input type="checkbox" id="samtycke-marketing"> Jag godkänner att mina uppgifter
                            samlas
                            för
                            marknadsföring från Translators AB.
                        </label>
                    </div>
                    <button type="button" id="btn-m">Skicka</button>
                    <div id="output" aria-live="polite"></div>
                </fieldset>

            </form>
            <!--aria-label="Skicka meddelande" behövs inte för button eftersom texten på knappen "Skicka" redan är tillräckligt bra.-->
            <section>

                <picture>
                    <source srcset="./image/skrivmaskin.webp" type="image/webp">
                    <img src="./image/skrivmaskin.jpg"
                        alt="Äldre svart skrivmaskin på ett skrivbord framför ett fönster" width="800" loading="lazy">
                </picture>
                <!-- Bild: CCO / Public  Domain -->

            </section>
        </section>

        <script src="script.js"></script>

    </main>
    <footer>
        <p>&copy; 2026 Translators AB</p>
    </footer>
</body>

</html>
