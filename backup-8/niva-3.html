Skydda inmatningen med textContent eller filtrering.

<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktiv sida</title>
    <link rel="stylesheet" href="styles.css">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; img-src 'self'; style-src 'self';">
    <meta name="description"
        content="En enkel webbsida där användaren kan skriva och visa ett meddelande. Exemplet demonstrerar säker hantering av användarinput och optimerade bilder.">



</head>

<body>
    <main class="page">
        <section class="card">
            <h1>Användarinteraktion</h1>

            <form>
                <label for="namn">Namn</label>
                <input type="text" id="namn" name="Namn" required>
                <label for="epost">Epost
                    <input type="email" placeholder="din-epost@exempel.se" name="email"></label>
                <label for="inputMeddelande">Lämna ett meddelande:</label>
                <input type="text" id="inputMeddelande" name="meddelande" placeholder="Skriv här">
                <button type="button" id="button-m">Skicka</button>
                <div id="output" aria-live="polite"></div>
                <label>
                    <input type="checkbox" id="consent"> Jag godkänner att uppgifterna används för att svara på mitt
                    meddelande.
                </label>
                <label>
                    <input type="checkbox" id="marketing-consent"> Jag godkänner att mina uppgifter samlas för
                    nyhetsbrev.
                </label>
            </form>
            <!--aria-label="Skicka meddelande" behövs inte för button eftersom texten på knappen "Skicka" redan är tillräckligt bra.-->

            <button id="accept">Acceptera cookies</button>

            <picture>
                <source srcset="./image/skrivmaskin.webp" type="image/webp">
                <img src="./image/skrivmaskin.jpg" alt="Äldre svart skrivmaskin på ett skrivbord framför ett fönster"
                    width="800" loading="lazy">
            </picture>
            <!-- Bild: CCO / Public  Domain -->

        </section>

        <script src="script.js"></script>

    </main>
    <footer>
        <p>&copy; 2026 Olivia</p>
    </footer>
</body>

</html>
