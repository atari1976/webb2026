<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktiv sida</title>
    <link rel="stylesheet" href="styles.css">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; img-src 'self'; style-src 'self';">
    <meta name="description"
        content="En enkel webbsida där användaren kan skriva och visa ett meddelande. Exemplet demonstrerar säker hantering av användarinput och optimerade bilder.">



</head>

<body>
    <main>
        <section class="interaktion">
            <h1>Användarinteraktion</h1>

            <!-- Flyttade texten i <p>Skriv ett meddelande:</p> in i formuläret för att skapa koppling mellan text och inputfält -->
            <form action="exempel.se/mapp" method="post">
                <label for="inputMeddelande">Skriv ett meddelande:</label>
                <input type="text" id="inputMeddelande">
                <button id="button-m" aria-label="Skicka meddelande">Skicka</button>
                <div id="output"></div>
            </form>
        </section>
        <section class="bild">

            <!-- Optimerad bild -->
            <picture>
                <source srcset="./image/skrivmaskin.webp" type="image/webp">
                <img src="./image/skrivmaskin.webp" alt="Äldre svart skrivmaskin på ett skrivbord framför ett fönster"
                    width="800" loading="lazy">
            </picture>
            <!-- Bild: CCO / Public  Domain -->

        </section>
